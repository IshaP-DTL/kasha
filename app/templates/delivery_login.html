<!DOCTYPE html>
<html>
<head>
    <title>Delivery Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .login-wrapper {
            height: 100vh;
        }

        .login-card {
            width: 400px;
            border-radius: 10px;
        }

        .login-header {
            background-color: #212529;
            color: white;
            padding: 20px;
            border-top-left-radius: 10px;
            border-top-right-radius: 10px;
            text-align: center;
        }

        .btn-login {
            background-color: #212529;
            border: none;
        }

        .btn-login:hover {
            background-color: #343a40;
        }
    </style>
</head>

<body>

<div class="container login-wrapper d-flex justify-content-center align-items-center">
    <div class="card login-card shadow">

        <div class="login-header">
            <h4 class="mb-0">Delivery Panel</h4>
        </div>

        <div class="card-body p-4">

            <form id="loginForm">
    <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="email" id="email" class="form-control" required>
    </div>

    <div class="mb-4">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" required>
    </div>

    <button type="submit" class="btn btn-login text-white w-100">
        Login
    </button>
</form>

<p id="errorMsg" class="text-danger mt-3"></p>

        </div>
    </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script>
$(document).ready(function () {

    $("#loginForm").on("submit", function (e) {
        e.preventDefault();

        let email = $("#email").val().trim();
        let password = $("#password").val().trim();

        $("#errorMsg").empty();

        $.ajax({
            url: "/deliveryLogin",
            type: "POST",
            headers: {
                "X-CSRFToken": "{{ csrf_token }}"
            },
            data: {
                Email: email,
                password: password
            },
            success: function (response) {
                    console.log("LOGIN RESPONSE:", response);

                    localStorage.setItem("deliveryToken", response.token);

                    // Check if there is a ?next= parameter
                    const urlParams = new URLSearchParams(window.location.search);
                    const nextUrl = urlParams.get("next");

                    if (nextUrl) {
                        window.location.href = nextUrl;
                    } else {
                        window.location.href = "/delivery_dashboard";
                    }
                },
            error: function (err) {
                if (err.responseJSON && err.responseJSON.error) {
                    $("#errorMsg").text(err.responseJSON.error);
                } else {
                    $("#errorMsg").text("Login failed");
                }
            }
        });

    });

});
</script>
</body>
</html>
