{% load static %}
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>

<div class="bg-overlay"></div>

<div class="card">
  <h2>Create Account</h2>

  <form method="post">
    <div id="message"></div>
    {% csrf_token %}

    <input type="text" name="username" placeholder="Username" id="username" required>

    <!-- PHONE ROW -->
    <div class="phone-row">
      <select name="countryCode" id="countryCode" autocomplete="country-name" required>
        <option value="IN">India</option>
        <option value="US">United States</option>
        <option value="GB">United Kingdom</option>
        <option value="AU">Australia</option>
      
      </select>

      <input
        type="tel"
        name="phone_number"
        placeholder="Phone Number"
        id="phonenumber"
        required
      >
    </div>

    <input type="email" name="email" placeholder="Email" id="email" required>

    <input type="password" name="password" placeholder="Password" id="password" required>
    <input type="password" name="confirm_password" placeholder="Confirm Password" id="confirmpassword" required>

    <button type="submit" id="registerButton">Register</button>

    <p class="text">
      Already have an account?
      <a href="{% url 'login' %}">Login</a>
    </p>
  </form>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
<script src="{% static 'js/API.js' %}"></script>
<script>
  $(document).ready(function(){
    $("#registerButton").on("click",function(e){
      e.preventDefault();
      let username=$("#username").val();
      let countryCode=$("#countryCode").val();
      let phonenumber=$("#phonenumber").val();
      let email=$("#email").val();
      let password=$("#password").val();
      let confirmpassword=$("#confirmpassword").val();
      let data={
        userName:username,
        countryCode:countryCode,
        phoneNo:phonenumber,
        Email:email,
        passWord:password,
        confirmPassword:confirmpassword
      }
      console.log("data",data)
      $.ajax({
        url: '{% url "CreateUser" %}',
        method:"POST",
        headers:{
          'X-CSRFToken':'{{csrf_token}}',
        },
        data:data,
        success:function(response){
          console.log("response",response)
          $("#message").html(
    `<div class="alert alert-success p-3">
      Successfully registered! Redirecting to login...
     </div>`
  );

  setTimeout(function(){
    window.location.href = "{% url 'login' %}";
  }, 2000);
          {% comment %} localStorage.setItem("token",response.token)
          localStorage.getItem("token") {% endcomment %}
        },
        error:function(err){
          console.log("err",err);
          $("#message").empty();
          let errMsg="Please Try Again";
          if (err.responseJSON){
            const errorResponse=err.responseJSON;
            if(errorResponse.error){
              $("#message").append(`<div class="p-3">${errorResponse.error}</div>`);
            }
            if(errorResponse.errors && Array.isArray(errorResponse.errors)){
              errorResponse.errors.forEach((error) => {
                $("#message").append(`<div class="alert danger">${error}</div>`);
              });
            }
          }
            else{
              $("#message").append(`<div class="alert alert-danger">${errMsg}</div>`);
            }
        }
      });
    })
  });
</script>
</body>
</html>
